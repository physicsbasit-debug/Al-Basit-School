name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.2
        with:
          github_repo_id: physicsbasit-debug/Al-Basit-School
          huggingface_repo_id: physicsbasit-debug/AI-Basit-School
          hf_token: ${{ secrets.HF_TOKEN }}